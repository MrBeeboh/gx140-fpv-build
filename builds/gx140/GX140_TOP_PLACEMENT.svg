<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 841 594" width="841" height="594">
  <defs>
    <style>
      .bg { fill: #fff; }
      .border { fill: none; stroke: #000; stroke-width: 1; }
      .frame { fill: #d0d0d0; stroke: #000; stroke-width: 1.2; }
      .arm { fill: #c8c8c8; stroke: #000; stroke-width: 0.8; }
      .fc-dash { fill: none; stroke: #0a7a3a; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .esc-dash { fill: none; stroke: #aa2020; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .vtx-dash { fill: none; stroke: #1a4a8a; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .cam-dash { fill: none; stroke: #666; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .rx-dash { fill: none; stroke: #1a6a6a; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .gps-dash { fill: none; stroke: #8a6a18; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .bat-dash { fill: none; stroke: #cc3030; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .motor-pnt { fill: #888; stroke: #000; stroke-width: 0.8; }
      .line-dim { fill: none; stroke: #000; stroke-width: 0.3; }
      .line-ext { fill: none; stroke: #000; stroke-width: 0.2; }
      .line-center { fill: none; stroke: #000; stroke-width: 0.2; stroke-dasharray: 8,2,2,2; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3.5px; fill: #000; }
      .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 2.8px; fill: #000; }
      .label-lg { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 5px; fill: #000; font-weight: bold; }
      .dim { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3px; fill: #000; }
    </style>
    <marker id="arr" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
    <marker id="arr-start" viewBox="0 0 6 6" refX="0" refY="3" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#000"/>
    </marker>
  </defs>

  <rect class="bg" width="841" height="594"/>
  <rect x="15" y="15" width="811" height="564" class="border"/>

  <!-- ============ TITLE BLOCK ============ -->
  <g transform="translate(15, 529)">
    <line x1="0" y1="0" x2="811" y2="0" class="line-thick"/>
    <line x1="200" y1="0" x2="200" y2="50"/>
    <line x1="400" y1="0" x2="400" y2="50"/>
    <line x1="550" y1="0" x2="550" y2="50"/>
    <line x1="650" y1="0" x2="650" y2="50"/>
    <line x1="711" y1="0" x2="711" y2="50"/>
    <line x1="0" y1="15" x2="200" y2="15"/>
    <line x1="400" y1="15" x2="550" y2="15"/>
    <line x1="400" y1="35" x2="550" y2="35"/>
    <text x="4" y="11" class="label">GX140 3in ANALOG FPV</text>
    <text x="4" y="28" class="label-sm">Frame: GX140 140mm | AUW ~190g</text>
    <text x="204" y="11" class="label-sm">DRAWN BY</text>
    <text x="204" y="28" class="label">AI Design Eng.</text>
    <text x="404" y="11" class="label-sm">DATE</text>
    <text x="404" y="28" class="label">2026-06-12</text>
    <text x="404" y="46" class="label-sm">SCALE: 1:1</text>
    <text x="554" y="11" class="label-sm">DWG NO</text>
    <text x="554" y="28" class="label">GX140-TOP-02</text>
    <text x="654" y="11" class="label-sm">REV</text>
    <text x="654" y="28" class="label-lg">2.0</text>
    <text x="715" y="11" class="label-sm">SHEET</text>
    <text x="715" y="28" class="label">2 / 4</text>
  </g>

  <text x="420" y="30" class="label-lg" text-anchor="middle">GX140 3in ANALOG FPV — COMPONENT PLACEMENT (TOP VIEW)</text>

  <!-- ============ CENTER LINES ============ -->
  <line x1="180" y1="295" x2="520" y2="295" class="line-center"/>
  <line x1="350" y1="130" x2="350" y2="480" class="line-center"/>

  <!-- ============ FRAME (centered approx 350, 295) ============ -->
  <g transform="translate(350, 295)">
    <!-- Main body -->
    <rect x="-45" y="-38" width="90" height="76" rx="4" class="frame"/>
    <!-- Arms -->
    <polygon points="35,-28 90,-65 96,-52 40,-16" class="arm"/>
    <polygon points="-35,-28 -90,-65 -96,-52 -40,-16" class="arm"/>
    <polygon points="-35,28 -90,65 -96,52 -40,16" class="arm"/>
    <polygon points="35,28 90,65 96,52 40,16" class="arm"/>

    <!-- === COMPONENT OUTLINES (dashed) === -->
    <rect x="-13" y="-13" width="26" height="26" rx="2" class="fc-dash"/>
    <rect x="-13" y="-13" width="26" height="26" rx="1" class="esc-dash" stroke-dashoffset="3"/>
    <rect x="-10" y="18" width="20" height="18" rx="2" class="vtx-dash"/>
    <rect x="-10" y="-28" width="20" height="16" rx="2" class="cam-dash"/>
    <path d="M-28,-5 L-16,-5 L-16,7 L-22,10 L-28,7 Z" class="rx-dash"/>
    <rect x="-12" y="-46" width="24" height="14" rx="2" class="gps-dash"/>
    <rect x="-20" y="-20" width="40" height="40" rx="4" class="bat-dash"/>

    <!-- === MOTORS === -->
    <g transform="translate(82, -52)"><circle cx="0" cy="0" r="7" class="motor-pnt"/><circle cx="0" cy="0" r="2.5" fill="#fff"/></g>
    <g transform="translate(-82, -52)"><circle cx="0" cy="0" r="7" class="motor-pnt"/><circle cx="0" cy="0" r="2.5" fill="#fff"/></g>
    <g transform="translate(-82, 52)"><circle cx="0" cy="0" r="7" class="motor-pnt"/><circle cx="0" cy="0" r="2.5" fill="#fff"/></g>
    <g transform="translate(82, 52)"><circle cx="0" cy="0" r="7" class="motor-pnt"/><circle cx="0" cy="0" r="2.5" fill="#fff"/></g>

    <!-- Motor labels -->
    <text x="82" y="-40" class="label-sm" text-anchor="middle">M1 FL</text>
    <text x="-82" y="-40" class="label-sm" text-anchor="middle">M2 FR</text>
    <text x="-82" y="64" class="label-sm" text-anchor="middle">M3 RL</text>
    <text x="82" y="64" class="label-sm" text-anchor="middle">M4 RR</text>

    <!-- === DIMENSIONS === -->
    <!-- Wheelbase diagonal -->
    <line x1="82" y1="-52" x2="-82" y2="52" class="line-dim" stroke-dasharray="3,2"/>
    <text x="5" y="5" class="dim" transform="rotate(42, 5, 5)">140mm WB</text>

    <!-- Width -->
    <line x1="-45" y1="42" x2="45" y2="42" class="line-dim" marker-start="url(#arr-start)" marker-end="url(#arr)"/>
    <text x="0" y="50" class="dim" text-anchor="middle">~90mm</text>

    <!-- Stack pattern -->
    <line x1="-13" y1="-18" x2="13" y2="-18" class="line-dim" marker-start="url(#arr-start)" marker-end="url(#arr)"/>
    <text x="0" y="-20" class="dim" text-anchor="middle">20mm</text>

    <!-- === CALLOUT LEADERS === -->
    <line x1="13" y1="-13" x2="40" y2="-25" class="line-dim"/>
    <text x="42" y="-28" class="label-sm">FC + ESC (20×20 stack)</text>

    <line x1="-10" y1="27" x2="-35" y2="42" class="line-dim"/>
    <text x="-98" y="39" class="label-sm">VTX (rear)</text>

    <line x1="-10" y1="-28" x2="-35" y2="-42" class="line-dim"/>
    <text x="-95" y="-45" class="label-sm">CAM (front, TPU wedge)</text>

    <line x1="-28" y1="1" x2="-48" y2="1" class="line-dim"/>
    <text x="-95" y="-3" class="label-sm">RX (side, foam tape)</text>

    <line x1="12" y1="-46" x2="35" y2="-55" class="line-dim"/>
    <text x="37" y="-58" class="label-sm">GPS (top mast)</text>

    <line x1="-20" y1="-20" x2="-45" y2="-35" class="line-dim"/>
    <text x="-105" y="-38" class="label-sm">BATTERY (under frame)</text>

    <!-- Antenna marks -->
    <circle cx="82" cy="-52" r="11" fill="none" stroke="#000" stroke-width="0.3" stroke-dasharray="2,2"/>
    <circle cx="-82" cy="-52" r="11" fill="none" stroke="#000" stroke-width="0.3" stroke-dasharray="2,2"/>
    <circle cx="-82" cy="52" r="11" fill="none" stroke="#000" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="82" y="-66" class="dim" text-anchor="middle">VTX ANT</text>
    <text x="-82" y="-66" class="dim" text-anchor="middle">RX ANT1 V</text>
    <text x="-82" y="66" class="dim" text-anchor="middle">RX ANT2 H</text>
  </g>

  <!-- NOTES -->
  <text x="25" y="520" class="label-sm">NOTES: 1) ALL DIMS IN mm  2) 20×20mm STACK PATTERN  3) BATTERY UNDERNEATH  4) ANTENNAS 90° APART</text>
</svg>
