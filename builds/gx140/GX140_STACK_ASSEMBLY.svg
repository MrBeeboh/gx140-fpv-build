<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 841 594" width="841" height="594">
  <defs>
    <style>
      .bg { fill: #fff; }
      .border { fill: none; stroke: #000; stroke-width: 1; }
      .line-thick { fill: none; stroke: #000; stroke-width: 1; }
      .line { fill: none; stroke: #000; stroke-width: 0.6; }
      .line-dim { fill: none; stroke: #000; stroke-width: 0.3; }
      .fc { fill: #0a7a3a; stroke: #000; stroke-width: 0.6; }
      .esc { fill: #aa2020; stroke: #000; stroke-width: 0.6; }
      .plate { fill: #d0d0d0; stroke: #000; stroke-width: 0.8; }
      .standoff { fill: #b8a04a; stroke: #000; stroke-width: 0.4; }
      .screw { fill: #aaa; stroke: #000; stroke-width: 0.3; }
      .hatch { stroke: #000; stroke-width: 0.2; stroke-dasharray: 1.5,1.5; opacity: 0.4; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3.5px; fill: #000; }
      .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 2.8px; fill: #000; }
      .label-lg { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 5px; fill: #000; font-weight: bold; }
      .dim { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3px; fill: #000; }
    </style>
    <marker id="arr" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
    <marker id="arr-start" viewBox="0 0 6 6" refX="0" refY="3" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#000"/>
    </marker>
  </defs>

  <rect class="bg" width="841" height="594"/>
  <rect x="15" y="15" width="811" height="564" class="border"/>

  <!-- ============ TITLE BLOCK ============ -->
  <g transform="translate(15, 529)">
    <line x1="0" y1="0" x2="811" y2="0"/>
    <line x1="200" y1="0" x2="200" y2="50"/>
    <line x1="400" y1="0" x2="400" y2="50"/>
    <line x1="550" y1="0" x2="550" y2="50"/>
    <line x1="650" y1="0" x2="650" y2="50"/>
    <line x1="711" y1="0" x2="711" y2="50"/>
    <line x1="0" y1="15" x2="200" y2="15"/>
    <line x1="400" y1="15" x2="550" y2="15"/>
    <line x1="400" y1="35" x2="550" y2="35"/>
    <text x="4" y="11" class="label">GX140 3in ANALOG FPV</text>
    <text x="4" y="28" class="label-sm">Frame: GX140 140mm | AUW ~190g</text>
    <text x="204" y="11" class="label-sm">DRAWN BY</text>
    <text x="204" y="28" class="label">AI Design Eng.</text>
    <text x="404" y="11" class="label-sm">DATE</text>
    <text x="404" y="28" class="label">2026-06-12</text>
    <text x="404" y="46" class="label-sm">SCALE: NTS</text>
    <text x="554" y="11" class="label-sm">DWG NO</text>
    <text x="554" y="28" class="label">GX140-STACK-03</text>
    <text x="654" y="11" class="label-sm">REV</text>
    <text x="654" y="28" class="label-lg">2.0</text>
    <text x="715" y="11" class="label-sm">SHEET</text>
    <text x="715" y="28" class="label">3 / 4</text>
  </g>

  <text x="420" y="30" class="label-lg" text-anchor="middle">GX140 3in ANALOG FPV — STACK ASSEMBLY (SECTION VIEW)</text>

  <!-- ============ MAIN STACK VIEW ============ -->
  <g transform="translate(300, 310)">

    <!-- Vertical centerline -->
    <line x1="0" y1="-220" x2="0" y2="30" class="line-dim" stroke-dasharray="10,3,2,3"/>

    <!-- === BOTTOM PLATE === -->
    <g transform="translate(0, 18)">
      <rect x="-55" y="-3" width="110" height="6" rx="0.5" class="plate"/>
      <line x1="-54" y1="-3" x2="54" y2="-3" class="hatch"/>
      <line x1="-54" y1="0" x2="54" y2="0" class="hatch"/>
      <line x1="-54" y1="3" x2="54" y2="3" class="hatch"/>
    </g>

    <!-- === MAIN FRAME === -->
    <g transform="translate(0, 0)">
      <rect x="-60" y="-5" width="120" height="10" rx="0.5" class="plate"/>
      <line x1="-59" y1="-5" x2="59" y2="-5" class="hatch"/>
      <line x1="-59" y1="-2" x2="59" y2="-2" class="hatch"/>
      <line x1="-59" y1="1" x2="59" y2="1" class="hatch"/>
      <line x1="-59" y1="4" x2="59" y2="4" class="hatch"/>
    </g>

    <!-- === ESC === -->
    <g transform="translate(0, -22)">
      <rect x="-50" y="-2.5" width="100" height="5" rx="0.3" class="esc"/>
      <rect x="-4" y="-2.5" width="8" height="5" rx="0.3" fill="#111"/>
    </g>

    <!-- === STANDOFFS === -->
    <g transform="translate(-25, -28)">
      <rect x="-2.5" y="0" width="5" height="24" rx="2" class="standoff"/>
      <line x1="-2" y1="4" x2="2" y2="4" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="8" x2="2" y2="8" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="12" x2="2" y2="12" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="16" x2="2" y2="16" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="20" x2="2" y2="20" stroke="#8a7020" stroke-width="0.3"/>
    </g>
    <g transform="translate(25, -28)">
      <rect x="-2.5" y="0" width="5" height="24" rx="2" class="standoff"/>
      <line x1="-2" y1="4" x2="2" y2="4" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="8" x2="2" y2="8" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="12" x2="2" y2="12" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="16" x2="2" y2="16" stroke="#8a7020" stroke-width="0.3"/>
      <line x1="-2" y1="20" x2="2" y2="20" stroke="#8a7020" stroke-width="0.3"/>
    </g>

    <!-- === FC === -->
    <g transform="translate(0, -60)">
      <rect x="-55" y="-2.5" width="110" height="5" rx="0.3" class="fc"/>
      <rect x="-4" y="-2.5" width="8" height="5" rx="0.3" fill="#111"/>
      <rect x="-55" y="-1.5" width="5" height="3" rx="0.3" fill="#ccc" stroke="#000" stroke-width="0.3"/>
    </g>

    <!-- === FC SCREWS === -->
    <g transform="translate(-25, -63)">
      <rect x="-1.5" y="0" width="3" height="3" rx="0.3" class="screw"/>
    </g>
    <g transform="translate(25, -63)">
      <rect x="-1.5" y="0" width="3" height="3" rx="0.3" class="screw"/>
    </g>

    <!-- === HEIGHT DIMENSIONS === -->
    <line x1="-80" y1="-87" x2="-80" y2="-63" class="line-dim" marker-start="url(#arr-start)" marker-end="url(#arr)"/>
    <line x1="-80" y1="-57" x2="-80" y2="-26" class="line-dim" marker-start="url(#arr-start)" marker-end="url(#arr)"/>
    <line x1="-80" y1="-20" x2="-80" y2="16" class="line-dim" marker-start="url(#arr-start)" marker-end="url(#arr)"/>

    <text x="-88" y="-76" class="dim">~6mm</text>
    <text x="-88" y="-44" class="dim">6mm</text>
    <text x="-88" y="0" class="dim">~8mm</text>
  </g>

  <!-- ============ STACK TABLE ============ -->
  <g transform="translate(560, 50)">
    <rect x="0" y="0" width="250" height="220" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
    <text x="4" y="10" class="label" font-weight="bold">STACK LAYER TABLE</text>
    <line x1="0" y1="14" x2="250" y2="14"/>
    <text x="4" y="24" class="label-sm" font-weight="bold">#</text>
    <text x="20" y="24" class="label-sm" font-weight="bold">PART</text>
    <text x="130" y="24" class="label-sm" font-weight="bold">THK mm</text>
    <text x="180" y="24" class="label-sm" font-weight="bold">FASTENER</text>
    <line x1="0" y1="26" x2="250" y2="26"/>
    <text x="4" y="36" class="label-sm">1</text><text x="20" y="36" class="label-sm">Bottom plate</text><text x="140" y="36" class="label-sm">2.0</text><text x="180" y="36" class="label-sm">—</text>
    <text x="4" y="48" class="label-sm">2</text><text x="20" y="48" class="label-sm">Main frame CF</text><text x="140" y="48" class="label-sm">4.0</text><text x="180" y="48" class="label-sm">M2.5×12</text>
    <text x="4" y="60" class="label-sm">3</text><text x="20" y="60" class="label-sm">ESC 4in1</text><text x="140" y="60" class="label-sm">1.6</text><text x="180" y="60" class="label-sm">Direct</text>
    <text x="4" y="72" class="label-sm">4</text><text x="20" y="72" class="label-sm">Nylon standoff</text><text x="140" y="72" class="label-sm">6.0</text><text x="180" y="72" class="label-sm">M2 F-F</text>
    <text x="4" y="84" class="label-sm">5</text><text x="20" y="84" class="label-sm">FC F405 Mini</text><text x="140" y="84" class="label-sm">1.6</text><text x="180" y="84" class="label-sm">M2×4</text>
    <text x="4" y="96" class="label-sm">6</text><text x="20" y="96" class="label-sm">VTX Zeus 350</text><text x="140" y="96" class="label-sm">1.6</text><text x="180" y="96" class="label-sm">M2×5</text>
    <text x="4" y="108" class="label-sm">7</text><text x="20" y="108" class="label-sm">CAM Caddx Ant</text><text x="140" y="108" class="label-sm">8.0</text><text x="180" y="108" class="label-sm">M1.6 nylon</text>
    <text x="4" y="120" class="label-sm">8</text><text x="20" y="120" class="label-sm">RX SuperD</text><text x="140" y="120" class="label-sm">1.2</text><text x="180" y="120" class="label-sm">Tape/scr</text>
    <text x="4" y="132" class="label-sm">9</text><text x="20" y="132" class="label-sm">GPS (opt)</text><text x="140" y="132" class="label-sm">1.6</text><text x="180" y="132" class="label-sm">M2×8</text>
    <text x="4" y="144" class="label-sm">10</text><text x="20" y="144" class="label-sm">Battery under</text><text x="140" y="144" class="label-sm">12.0</text><text x="180" y="144" class="label-sm">Strap</text>
    <line x1="0" y1="150" x2="250" y2="150"/>
    <text x="4" y="162" class="label-sm" font-weight="bold">Stack total</text><text x="140" y="162" class="label-sm" font-weight="bold">~39.6mm</text>
  </g>

  <!-- ============ MOUNTING NOTES ============ -->
  <g transform="translate(560, 290)">
    <rect x="0" y="0" width="250" height="120" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
    <text x="4" y="10" class="label" font-weight="bold">MOUNTING METHOD</text>
    <text x="4" y="24" class="label-sm">FC/ESC: M2 nylon standoffs ×4</text>
    <text x="4" y="36" class="label-sm">VTX: M2 brass standoffs or TPU</text>
    <text x="4" y="48" class="label-sm">CAM: TPU wedge, M1.6 screws</text>
    <text x="4" y="60" class="label-sm">RX: Foam tape or 3D tray</text>
    <text x="4" y="72" class="label-sm">GPS: Nylon standoffs on mast</text>
    <text x="4" y="84" class="label-sm">BAT: 2× 20mm straps</text>
    <text x="4" y="96" class="label-sm">MOT: M2×5 + Loctite 243</text>
    <text x="4" y="108" class="label-sm">Stack: Nylon throughout (vibe)</text>
  </g>

  <!-- TORQUE -->
  <g transform="translate(560, 430)">
    <rect x="0" y="0" width="250" height="80" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
    <text x="4" y="10" class="label" font-weight="bold">TORQUE</text>
    <text x="4" y="24" class="label-sm">Motor M2×5: 0.25 N·m</text>
    <text x="4" y="36" class="label-sm">Stack M2 nylon: 0.15 N·m</text>
    <text x="4" y="48" class="label-sm">Plate M2.5: 0.35–0.4 N·m</text>
    <text x="4" y="60" class="label-sm">Prop nut: Hand + 1/4 turn</text>
  </g>

  <text x="25" y="520" class="label-sm">NOTES: 1) ALL DIMS IN mm  2) NYLON HARDWARE THROUGHOUT  3) LOCTITE 243 ON MOTOR SCREWS  4) SMOKE STOPPER FIRST POWER-UP</text>
</svg>
