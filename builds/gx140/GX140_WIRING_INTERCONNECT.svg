<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 841 594" width="841" height="594">
  <defs>
    <style>
      .bg { fill: #fff; }
      .border { fill: none; stroke: #000; stroke-width: 1; }
      .line { fill: none; stroke: #000; stroke-width: 0.5; }
      .line-thin { fill: none; stroke: #000; stroke-width: 0.3; }
      .fc { fill: #0a7a3a; stroke: #000; stroke-width: 0.8; }
      .esc { fill: #aa2020; stroke: #000; stroke-width: 0.8; }
      .vtx { fill: #1a4a8a; stroke: #000; stroke-width: 0.8; }
      .cam { fill: #666; stroke: #000; stroke-width: 0.8; }
      .rx { fill: #1a6a6a; stroke: #000; stroke-width: 0.8; }
      .gps { fill: #8a6a18; stroke: #000; stroke-width: 0.8; }
      .bat { fill: #cc3030; stroke: #000; stroke-width: 0.8; }
      .wire-r { fill: none; stroke: #cc2020; stroke-width: 1; }
      .wire-bk { fill: none; stroke: #000; stroke-width: 1; }
      .wire-y { fill: none; stroke: #ccaa00; stroke-width: 1; }
      .wire-g { fill: none; stroke: #22aa22; stroke-width: 1; }
      .wire-w { fill: none; stroke: #888; stroke-width: 1; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3.5px; fill: #000; }
      .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 2.8px; fill: #000; }
      .label-lg { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 5px; fill: #000; font-weight: bold; }
      .pin { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 2.5px; fill: #000; }
      .tag { font-family: 'Courier New', monospace; font-size: 2.2px; fill: #666; }
      .tag-box { fill: #f8f8f8; stroke: #000; stroke-width: 0.3; }
    </style>
  </defs>

  <rect class="bg" width="841" height="594"/>
  <rect x="15" y="15" width="811" height="564" class="border"/>

  <!-- ============ TITLE BLOCK ============ -->
  <g transform="translate(15, 529)">
    <line x1="0" y1="0" x2="811" y2="0"/>
    <line x1="200" y1="0" x2="200" y2="50"/>
    <line x1="400" y1="0" x2="400" y2="50"/>
    <line x1="550" y1="0" x2="550" y2="50"/>
    <line x1="650" y1="0" x2="650" y2="50"/>
    <line x1="711" y1="0" x2="711" y2="50"/>
    <line x1="0" y1="15" x2="200" y2="15"/>
    <line x1="400" y1="15" x2="550" y2="15"/>
    <line x1="400" y1="35" x2="550" y2="35"/>
    <text x="4" y="11" class="label">GX140 3in ANALOG FPV</text>
    <text x="4" y="28" class="label-sm">Frame: GX140 140mm | AUW ~190g</text>
    <text x="204" y="11" class="label-sm">DRAWN BY</text>
    <text x="204" y="28" class="label">AI Design Eng.</text>
    <text x="404" y="11" class="label-sm">DATE</text>
    <text x="404" y="28" class="label">2026-06-12</text>
    <text x="404" y="46" class="label-sm">SCALE: NTS</text>
    <text x="554" y="11" class="label-sm">DWG NO</text>
    <text x="554" y="28" class="label">GX140-WIRE-04</text>
    <text x="654" y="11" class="label-sm">REV</text>
    <text x="654" y="28" class="label-lg">2.0</text>
    <text x="715" y="11" class="label-sm">SHEET</text>
    <text x="715" y="28" class="label">4 / 4</text>
  </g>

  <text x="420" y="30" class="label-lg" text-anchor="middle">GX140 3in ANALOG FPV — POINT-TO-POINT WIRING DIAGRAM</text>

  <!-- ============ COMPONENT BLOCKS ============ -->

  <!-- FC (center) -->
  <g transform="translate(320, 310)">
    <rect x="-40" y="-28" width="80" height="56" rx="3" class="fc"/>
    <text x="0" y="-18" class="label" text-anchor="middle" font-weight="bold">FC SpeedyBee F405 Mini</text>
    <line x1="-36" y1="-14" x2="36" y2="-14" stroke="#000" stroke-width="0.3"/>
    <text x="-44" y="0" class="pin" text-anchor="end">VBAT</text>
    <text x="-44" y="7" class="pin" text-anchor="end">GND</text>
    <text x="-44" y="14" class="pin" text-anchor="end">CURR</text>
    <text x="-44" y="21" class="pin" text-anchor="end">VIN</text>
    <text x="44" y="0" class="pin">5V</text>
    <text x="44" y="7" class="pin">VOUT</text>
    <text x="44" y="14" class="pin">M1 M2 M3 M4</text>
    <text x="-35" y="32" class="pin">TX4 TX5 RX5 TX3 RX3 SDA SCL</text>
  </g>

  <!-- ESC (below FC) -->
  <g transform="translate(320, 420)">
    <rect x="-36" y="-18" width="72" height="36" rx="3" class="esc"/>
    <text x="0" y="-8" class="label" text-anchor="middle" font-weight="bold">ESC BLS 35A 4in1</text>
    <text x="-40" y="3" class="pin" text-anchor="end">VBAT+</text>
    <text x="-40" y="10" class="pin" text-anchor="end">VBAT-</text>
    <text x="40" y="3" class="pin">S1 S2 S3 S4</text>
    <text x="40" y="10" class="pin">CURR</text>
  </g>

  <!-- Battery (bottom) -->
  <g transform="translate(320, 490)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" class="bat"/>
    <text x="0" y="3" class="label" text-anchor="middle" font-size="3">BAT 2S 550mAh</text>
    <text x="-34" y="-3" class="pin" text-anchor="end">+</text>
    <text x="-34" y="5" class="pin" text-anchor="end">-</text>
  </g>

  <!-- VTX (right) -->
  <g transform="translate(560, 240)">
    <rect x="-30" y="-20" width="60" height="40" rx="3" class="vtx"/>
    <text x="0" y="-10" class="label" text-anchor="middle" font-weight="bold">VTX Zeus 350</text>
    <text x="-34" y="2" class="pin" text-anchor="end">5V GND</text>
    <text x="-34" y="10" class="pin" text-anchor="end">VID_IN</text>
    <text x="-34" y="18" class="pin" text-anchor="end">SA</text>
  </g>

  <!-- Camera (left) -->
  <g transform="translate(80, 240)">
    <rect x="-28" y="-18" width="56" height="36" rx="3" class="cam"/>
    <text x="0" y="-8" class="label" text-anchor="middle" font-weight="bold">CAM Caddx Ant</text>
    <text x="32" y="2" class="pin">5V GND</text>
    <text x="32" y="10" class="pin">VID</text>
  </g>

  <!-- RX (right lower) -->
  <g transform="translate(560, 360)">
    <rect x="-28" y="-15" width="56" height="30" rx="3" class="rx"/>
    <text x="0" y="-5" class="label" text-anchor="middle" font-weight="bold">RX SuperD ELRS</text>
    <text x="-32" y="3" class="pin" text-anchor="end">5V GND</text>
    <text x="-32" y="11" class="pin" text-anchor="end">RX TX</text>
  </g>

  <!-- GPS (right top) -->
  <g transform="translate(560, 130)">
    <rect x="-28" y="-14" width="56" height="28" rx="3" class="gps"/>
    <text x="0" y="-4" class="label" text-anchor="middle" font-weight="bold">GPS M10Q-5883</text>
    <text x="-32" y="3" class="pin" text-anchor="end">5V GND</text>
    <text x="-32" y="11" class="pin" text-anchor="end">RX TX</text>
  </g>

  <!-- ============ WIRES ============ -->
  <path class="wire-r" d="M290,490 L240,490 L240,430 L284,420"/>
  <path class="wire-bk" d="M290,482 L235,482 L235,422 L284,412"/>
  <text x="220" y="460" class="tag">P1/P2: 22AWG VBAT/GND</text>

  <path class="wire-r" d="M290,495 L190,495 L190,340 L280,325"/>
  <path class="wire-bk" d="M290,487 L185,487 L185,330 L280,318"/>
  <text x="155" y="420" class="tag">P3/P4: 22AWG VBAT FC</text>

  <path class="wire-r" d="M320,402 L320,385"/>
  <path class="wire-bk" d="M315,402 L315,385"/>
  <path class="wire-y" d="M325,402 L325,385"/>
  <path class="wire-w" d="M330,402 L330,385"/>
  <text x="335" y="395" class="tag">H1-H7: ESC harness</text>

  <path class="wire-r" d="M360,310 L420,310 L420,240 L530,240"/>
  <path class="wire-bk" d="M360,305 L425,305 L425,246 L530,246"/>
  <text x="430" y="280" class="tag">5V/GND: FC→VTX 26AWG</text>

  <path class="wire-r" d="M280,310 L220,310 L220,250 L108,250"/>
  <path class="wire-bk" d="M280,305 L215,305 L215,255 L108,255"/>
  <text x="180" y="290" class="tag">5V/GND: FC→CAM 26AWG</text>

  <path class="wire-r" d="M360,320 L440,320 L440,365 L532,365"/>
  <path class="wire-bk" d="M360,325 L445,325 L445,372 L532,372"/>

  <path class="wire-r" d="M360,300 L450,300 L450,140 L532,140"/>
  <path class="wire-bk" d="M360,295 L455,295 L455,147 L532,147"/>

  <!-- Video CAM→FC -->
  <path class="wire-y" d="M108,245 L65,245 L65,210 L290,210 L290,290"/>
  <text x="150" y="228" class="tag">VID: CAM→FC VIN 26AWG</text>

  <!-- Video FC→VTX -->
  <path class="wire-y" d="M360,315 L410,315 L410,230 L530,230"/>
  <text x="420" y="300" class="tag">VOUT: FC→VTX 26AWG</text>

  <!-- SmartAudio -->
  <path class="wire-g" d="M310,336 L470,336 L470,255 L530,255"/>
  <text x="380" y="330" class="tag">TX4→SA (SmartAudio)</text>

  <!-- CRSF -->
  <path class="wire-g" d="M315,340 L500,340 L500,371 L528,371"/>
  <text x="380" y="350" class="tag">TX5→RX.RX (CRSF)</text>

  <path class="wire-w" d="M528,378 L490,378 L490,345 L325,345"/>
  <text x="395" y="380" class="tag">RX.TX→RX5</text>

  <!-- GPS -->
  <path class="wire-g" d="M305,340 L475,340 L475,145 L532,145"/>
  <path class="wire-w" d="M532,152 L480,152 L480,350 L305,350"/>

  <!-- ============ TAG EXAMPLE ============ -->
  <g transform="translate(30, 470)">
    <rect x="0" y="0" width="280" height="50" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
    <text x="4" y="10" class="label-sm" font-weight="bold">REVERSE WIRE TAGGING METHOD</text>
    <text x="4" y="22" class="label-sm">Tag each wire at DESTINATION end: → DST.PIN ← SRC.COMP.PIN</text>
    <rect x="4" y="26" width="130" height="8" class="tag-box"/>
    <text x="69" y="33" class="pin" text-anchor="middle">→ VTX.VID_IN ← FC.VOUT</text>
    <rect x="140" y="26" width="130" height="8" class="tag-box"/>
    <text x="205" y="33" class="pin" text-anchor="middle">→ RX.RX ← FC.TX5 CRSF</text>
    <text x="4" y="46" class="tag">Fit 1.5mm heat shrink tag 10mm from pad</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(680, 450)">
    <rect x="0" y="0" width="130" height="70" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
    <text x="4" y="10" class="label-sm" font-weight="bold">WIRE COLORS</text>
    <line x1="4" y1="16" x2="20" y2="16" class="wire-r"/>
    <text x="24" y="19" class="pin">Red — VBAT/5V</text>
    <line x1="4" y1="25" x2="20" y2="25" class="wire-bk"/>
    <text x="24" y="28" class="pin">Black — GND</text>
    <line x1="4" y1="34" x2="20" y2="34" class="wire-y"/>
    <text x="24" y="37" class="pin">Yellow — Video</text>
    <line x1="4" y1="43" x2="20" y2="43" class="wire-g"/>
    <text x="24" y="46" class="pin">Green — TX</text>
    <line x1="4" y1="52" x2="20" y2="52" class="wire-w"/>
    <text x="24" y="55" class="pin">White — RX</text>

    <text x="4" y="64" class="pin">22AWG pwr | 26AWG sig</text>
  </g>

  <text x="25" y="520" class="label-sm">NOTES: 1) TAG ALL WIRES AT DESTINATION END  2) USE 1.5mm HEAT SHRINK TAGS  3) CONTINUITY CHECK BEFORE POWER  4) SMOKE STOPPER FIRST BATTERY</text>
</svg>
