<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 841 594" width="841" height="594">
  <!-- A3 landscape: 420mm @ 2px/mm -->

  <defs>
    <style>
      .bg { fill: #fff; }
      .border { fill: none; stroke: #000; stroke-width: 1; }
      .frame { fill: #d0d0d0; stroke: #000; stroke-width: 1.2; }
      .arm { fill: #c8c8c8; stroke: #000; stroke-width: 0.8; }
      .fc { fill: #0a7a3a; stroke: #000; stroke-width: 0.8; }
      .esc { fill: #aa2020; stroke: #000; stroke-width: 0.8; }
      .motor { fill: #888; stroke: #000; stroke-width: 0.8; }
      .bell { fill: #aaa; stroke: #000; stroke-width: 0.5; }
      .vtx { fill: #1a4a8a; stroke: #000; stroke-width: 0.8; }
      .cam { fill: #666; stroke: #000; stroke-width: 0.8; }
      .rx { fill: #1a6a6a; stroke: #000; stroke-width: 0.8; }
      .gps { fill: #8a6a18; stroke: #000; stroke-width: 0.8; }
      .bat { fill: #cc3030; stroke: #000; stroke-width: 0.8; }
      .antenna { fill: #8a6a18; stroke: #000; stroke-width: 0.6; }
      .standoff { fill: #b8a04a; stroke: #000; stroke-width: 0.5; }
      .tpu { fill: #6a7a8a; stroke: #000; stroke-width: 0.5; }
      .line-thick { fill: none; stroke: #000; stroke-width: 1; }
      .line-thin { fill: none; stroke: #000; stroke-width: 0.4; }
      .line-hidden { fill: none; stroke: #000; stroke-width: 0.3; stroke-dasharray: 3,2; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3.5px; fill: #000; }
      .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 2.8px; fill: #000; }
      .label-lg { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 5px; fill: #000; font-weight: bold; }
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 5px; fill: #000; font-weight: bold; }
      .title-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 3px; fill: #000; }
    </style>
  </defs>

  <rect class="bg" width="841" height="594"/>

  <!-- Border -->
  <rect x="15" y="15" width="811" height="564" class="border"/>

  <!-- ============ TITLE BLOCK ============ -->
  <g transform="translate(15, 529)">
    <line x1="0" y1="0" x2="811" y2="0" class="line-thick"/>
    <line x1="0" y1="35" x2="811" y2="35" class="line-thin"/>

    <!-- Block grid -->
    <line x1="0" y1="0" x2="0" y2="50" class="line-thin"/>
    <line x1="200" y1="0" x2="200" y2="50" class="line-thin"/>
    <line x1="400" y1="0" x2="400" y2="50" class="line-thin"/>
    <line x1="550" y1="0" x2="550" y2="50" class="line-thin"/>
    <line x1="650" y1="0" x2="650" y2="50" class="line-thin"/>
    <line x1="711" y1="0" x2="711" y2="50" class="line-thin"/>
    <line x1="0" y1="15" x2="200" y2="15" class="line-thin"/>
    <line x1="400" y1="15" x2="550" y2="15" class="line-thin"/>
    <line x1="400" y1="35" x2="550" y2="35" class="line-thin"/>
    <line x1="400" y1="15" x2="400" y2="50" class="line-thin"/>

    <text x="4" y="11" class="label">GX140 3in ANALOG FPV</text>
    <text x="4" y="28" class="label-sm">Frame: GX140 140mm | AUW ~190g</text>
    <text x="4" y="43" class="label-sm">FC: SpeedyBee F405 Mini | ESC: BLS 35A 4in1</text>

    <text x="204" y="11" class="label-sm">DRAWN BY</text>
    <text x="204" y="28" class="label">AI Design Eng.</text>

    <text x="404" y="11" class="label-sm">DATE</text>
    <text x="404" y="28" class="label">2026-06-12</text>
    <text x="404" y="46" class="label-sm">SCALE: NTS</text>

    <text x="554" y="11" class="label-sm">DWG NO</text>
    <text x="554" y="28" class="label">GX140-ISO-01</text>

    <text x="654" y="11" class="label-sm">REV</text>
    <text x="654" y="28" class="label-lg">2.0</text>

    <text x="715" y="11" class="label-sm">SHEET</text>
    <text x="715" y="28" class="label">1 / 4</text>
  </g>

  <!-- ============ TITLE ============ -->
  <text x="420" y="30" class="label-lg" text-anchor="middle">GX140 3in ANALOG FPV — EXPLODED ISO ASSEMBLY</text>

  <!-- ============ COMPONENT LEGEND (right side) ============ -->
  <g transform="translate(600, 50)">
    <rect x="0" y="0" width="210" height="130" fill="#f8f8f8" stroke="#000" stroke-width="0.5"/>
    <text x="4" y="10" class="label" font-weight="bold">COMPONENT LEGEND</text>

    <rect x="4" y="16" width="8" height="5" class="fc"/><text x="16" y="21" class="label-sm">FC — SpeedyBee F405 Mini</text>
    <rect x="4" y="26" width="8" height="5" class="esc"/><text x="16" y="31" class="label-sm">ESC — BLS 35A 4in1</text>
    <rect x="4" y="36" width="8" height="5" class="vtx"/><text x="16" y="41" class="label-sm">VTX — HGLRC Zeus 350mW</text>
    <rect x="4" y="46" width="8" height="5" class="cam"/><text x="16" y="51" class="label-sm">CAM — Caddx Ant 1200TVL</text>
    <rect x="4" y="56" width="8" height="5" class="rx"/><text x="16" y="61" class="label-sm">RX — SuperD ELRS 2.4G</text>
    <rect x="4" y="66" width="8" height="5" class="gps"/><text x="16" y="71" class="label-sm">GPS — M10Q-5883 (opt)</text>
    <rect x="4" y="76" width="8" height="5" class="bat"/><text x="16" y="81" class="label-sm">BAT — 2S 550mAh LiHV</text>
    <rect x="4" y="86" width="8" height="5" class="motor"/><text x="16" y="91" class="label-sm">MOT — HGLRC Specter 1804</text>
    <rect x="4" y="96" width="8" height="5" class="standoff"/><text x="16" y="101" class="label-sm">Nylon standoffs M2</text>
    <rect x="4" y="106" width="8" height="5" class="tpu"/><text x="16" y="111" class="label-sm">TPU mount (3D print)</text>
    <rect x="4" y="116" width="8" height="5" class="antenna"/><text x="16" y="121" class="label-sm">Antenna (SMA / U.FL)</text>
  </g>

  <!-- ============ MAIN ISO VIEW ============ -->
  <g transform="translate(340, 260)">

    <!-- === LEVEL 0: BATTERY === -->
    <g>
      <rect x="-35" y="-22" width="70" height="44" rx="4" class="bat" stroke-width="1"/>
      <text x="0" y="3" class="label-sm" text-anchor="middle">2S 550mAh</text>
      <rect x="-8" y="-28" width="16" height="6" rx="1" fill="#888" stroke="#000" stroke-width="0.5"/>
      <!-- leader -->
      <line x1="-50" y1="0" x2="-75" y2="-30" class="line-thin" marker-end="url(#arrow)"/>
    </g>

    <!-- === LEVEL 1: FRAME === -->
    <g>
      <!-- Center body -->
      <rect x="-40" y="-30" width="80" height="60" rx="4" class="frame"/>
      <!-- Arms (simplified ISO) -->
      <polygon points="35,-20 85,-50 90,-40 40,-10" class="arm"/>
      <polygon points="-35,-20 -85,-50 -90,-40 -40,-10" class="arm"/>
      <polygon points="-35,20 -85,50 -90,40 -40,10" class="arm"/>
      <polygon points="35,20 85,50 90,40 40,10" class="arm"/>
      <!-- Stack opening -->
      <rect x="-12" y="-12" width="24" height="24" rx="1" fill="#fff" stroke="#000" stroke-width="0.3"/>
    </g>

    <!-- === LEVEL 2: ESC === -->
    <g transform="translate(0, -35)">
      <rect x="-14" y="-14" width="28" height="28" rx="2" class="esc"/>
      <circle cx="-9" cy="-9" r="1.5" fill="#fff"/>
      <circle cx="9" cy="-9" r="1.5" fill="#fff"/>
      <circle cx="-9" cy="9" r="1.5" fill="#fff"/>
      <circle cx="9" cy="9" r="1.5" fill="#fff"/>
      <rect x="-3" y="-3" width="6" height="6" rx="1" fill="#111"/>
    </g>

    <!-- === STANDOFFS === -->
    <g class="standoff">
      <rect x="-10" y="-62" width="3.5" height="24" rx="1.5"/>
      <rect x="6.5" y="-62" width="3.5" height="24" rx="1.5"/>
      <rect x="-10" y="-38" width="3.5" height="24" rx="1.5"/>
      <rect x="6.5" y="-38" width="3.5" height="24" rx="1.5"/>
    </g>

    <!-- === LEVEL 3: FC === -->
    <g transform="translate(0, -72)">
      <path d="M-15,-12 L15,-12 L15,12 L-15,12 Z" class="fc"/>
      <circle cx="-9" cy="-9" r="1.5" fill="#fff"/>
      <circle cx="9" cy="-9" r="1.5" fill="#fff"/>
      <circle cx="-9" cy="9" r="1.5" fill="#fff"/>
      <circle cx="9" cy="9" r="1.5" fill="#fff"/>
      <rect x="2" y="-5" width="6" height="6" rx="1" fill="#111"/>
      <rect x="-14" y="-3" width="4" height="6" rx="0.5" fill="#ccc" stroke="#000" stroke-width="0.3"/>
    </g>

    <!-- === LEVEL 4: VTX (rear) === -->
    <g transform="translate(25, -80)">
      <rect x="-12" y="-10" width="24" height="20" rx="2" class="vtx"/>
      <rect x="12" y="-3" width="6" height="6" rx="1" class="antenna"/>
      <rect x="-4" y="-4" width="8" height="8" rx="1" fill="#111"/>
      <circle cx="0" cy="7" r="1.2" fill="#666"/>
    </g>

    <!-- === LEVEL 4: CAMERA (front) === -->
    <g transform="translate(-30, -82)">
      <polygon points="-14,-8 14,-8 12,3 -12,3" class="tpu"/>
      <rect x="-10" y="-5" width="20" height="10" rx="2" class="cam"/>
      <circle cx="6" cy="0" r="4.5" fill="#4a2a6a" stroke="#000" stroke-width="0.3"/>
      <circle cx="6" cy="0" r="2.5" fill="#6a3a9a"/>
    </g>

    <!-- === LEVEL 4: RX (side) === -->
    <g transform="translate(-20, -100)">
      <path d="M-12,-6 L12,-6 L12,6 L0,10 L-12,6 Z" class="rx"/>
      <rect x="-4" y="-3" width="8" height="5" rx="1" fill="#111"/>
      <circle cx="5" cy="4" r="1.5" class="antenna"/>
      <circle cx="-5" cy="4" r="1.5" class="antenna"/>
    </g>

    <!-- === LEVEL 5: GPS (mast) === -->
    <g transform="translate(25, -120)">
      <rect x="-1.5" y="0" width="3" height="12" class="standoff"/>
      <rect x="-12" y="-14" width="24" height="14" rx="2" class="gps"/>
      <rect x="-4" y="-11" width="8" height="8" rx="1" fill="#111"/>
    </g>

    <!-- === MOTORS (4x) === -->
    <g transform="translate(75, -42)">
      <rect x="-8" y="-8" width="16" height="16" rx="2" class="motor"/>
      <circle cx="0" cy="0" r="5.5" class="bell"/>
      <circle cx="0" cy="0" r="2" fill="#666"/>
      <text x="0" y="13" class="label-sm" text-anchor="middle">M1 FL</text>
    </g>
    <g transform="translate(-75, -42)">
      <rect x="-8" y="-8" width="16" height="16" rx="2" class="motor"/>
      <circle cx="0" cy="0" r="5.5" class="bell"/>
      <circle cx="0" cy="0" r="2" fill="#666"/>
      <text x="0" y="13" class="label-sm" text-anchor="middle">M2 FR</text>
    </g>
    <g transform="translate(-75, 42)">
      <rect x="-8" y="-8" width="16" height="16" rx="2" class="motor"/>
      <circle cx="0" cy="0" r="5.5" class="bell"/>
      <circle cx="0" cy="0" r="2" fill="#666"/>
      <text x="0" y="13" class="label-sm" text-anchor="middle">M3 RL</text>
    </g>
    <g transform="translate(75, 42)">
      <rect x="-8" y="-8" width="16" height="16" rx="2" class="motor"/>
      <circle cx="0" cy="0" r="5.5" class="bell"/>
      <circle cx="0" cy="0" r="2" fill="#666"/>
      <text x="0" y="13" class="label-sm" text-anchor="middle">M4 RR</text>
    </g>

    <!-- === ANTENNAS === -->
    <g transform="translate(55, -75)">
      <rect x="-2" y="-10" width="4" height="10" rx="1" class="antenna"/>
      <line x1="0" y1="-10" x2="0" y2="-28" stroke="#8a6a18" stroke-width="1.5"/>
    </g>
    <g transform="translate(-80, -25)">
      <rect x="-2" y="-10" width="4" height="10" rx="1" class="tpu"/>
      <line x1="0" y1="-10" x2="0" y2="-30" stroke="#8a6a18" stroke-width="1.2"/>
    </g>
    <g transform="translate(80, 35)">
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#8a6a18" stroke-width="1.2"/>
    </g>
  </g>

  <!-- ============ CALLOUTS ============ -->
  <g>
    <line x1="295" y1="225" x2="240" y2="180" class="line-thin"/>
    <text x="145" y="175" class="label-sm">EXP: 1 GPS — M10Q-5883 (top mast)</text>

    <line x1="320" y1="200" x2="240" y2="200" class="line-thin"/>
    <text x="145" y="195" class="label-sm">EXP: 2 RX — SuperD ELRS (side)</text>

    <line x1="295" y1="185" x2="240" y2="210" class="line-thin"/>
    <text x="145" y="215" class="label-sm">EXP: 3 VTX — Zeus 350mW (rear)</text>

    <line x1="310" y1="175" x2="240" y2="230" class="line-thin"/>
    <text x="145" y="235" class="label-sm">EXP: 4 FC — SpeedyBee F405 Mini</text>

    <line x1="310" y1="170" x2="240" y2="250" class="line-thin"/>
    <text x="145" y="255" class="label-sm">EXP: 5 Nylon standoffs M2×6mm</text>

    <line x1="310" y1="165" x2="240" y2="270" class="line-thin"/>
    <text x="145" y="275" class="label-sm">EXP: 6 ESC — BLS 35A 4in1</text>
  </g>

  <!-- NOTES -->
  <text x="25" y="520" class="label-sm">NOTES: 1) ALL DIMS IN mm  2) STACK: 20×20mm PATTERN, M2 HARDWARE  3) BATTERY MOUNTED UNDER FRAME  4) 3D PRINTED TPU MOUNTS AS SHOWN</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 4 4" refX="4" refY="2" markerWidth="3" markerHeight="3" orient="auto">
      <path d="M0,0 L4,2 L0,4 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
